<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E2StreamHub</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>

<!-- ─── Top Bar ──────────────────────────────────────────────────────────── -->
<header class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">📺</span>
    <span class="topbar-title">E2StreamHub</span>
  </div>
  <nav class="topbar-nav">
    <button class="nav-btn active" data-view="player">Player</button>
    <button class="nav-btn" data-view="epg">EPG Guide</button>
    <button class="nav-btn" data-view="editor">Bouquet Editor</button>
  </nav>
  <div class="topbar-right">
    <button class="nav-btn" id="logToggleBtn" title="Server Log">Log</button>
    <span class="status-dot" id="statusDot" title="Receiver Status"></span>
    <span class="current-time" id="currentTime"></span>
    <button class="logout-btn" id="logoutBtn">Sign out</button>
  </div>
</header>

<!-- ─── Player View ──────────────────────────────────────────────────────── -->
<div class="view active" id="viewPlayer">
  <aside class="sidebar">
    <div class="sidebar-header">
      <select class="bouquet-select" id="bouquetSelect">
        <option value="">Loading bouquets…</option>
      </select>
      <input class="channel-search" id="channelSearch" type="search" placeholder="Search channels…" autocomplete="off" />
    </div>
    <div class="channel-list" id="channelList">
      <div class="list-placeholder">Please select a bouquet</div>
    </div>
  </aside>

  <main class="main-content">
    <div class="log-panel" id="logPanel" style="display:none">
      <div class="log-header">
        <span class="log-title">Server Log</span>
        <div class="log-actions">
          <button class="btn-icon log-clear-btn" id="logClearBtn" title="Clear">🗑</button>
          <button class="btn-icon log-close-btn" id="logCloseBtn" title="Close">✕</button>
        </div>
      </div>
      <div class="log-body" id="logBody"></div>
    </div>
    <div class="main-inner">
      <div class="player-area">
        <div class="video-wrapper">
          <video id="videoPlayer" controls playsinline></video>
          <div class="video-overlay" id="videoOverlay">
            <div class="overlay-icon">▶</div>
            <div class="overlay-text">Select a channel</div>
          </div>
          <div class="buffering-spinner" id="bufferingSpinner"></div>
        </div>

        <div class="now-playing" id="nowPlaying" style="display:none">
          <div class="now-playing-channel" id="npChannel"></div>
          <div class="now-playing-info">
            <div class="now-playing-title" id="npTitle"></div>
            <div class="now-playing-time" id="npTime"></div>
            <div class="now-playing-progress">
              <div class="progress-bar" id="npProgress"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="epg-panel" id="epgPanel">
        <div class="epg-panel-header">Programme Info</div>
        <div class="epg-panel-content" id="epgContent">
          <div class="epg-empty">No channel selected</div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ─── EPG Guide Overlay ─────────────────────────────────────────────────── -->
<div class="epg-overlay" id="epgOverlay" aria-hidden="true">
  <div class="epg-overlay-panel">
    <div class="epg-guide-header">
      <div class="epg-guide-controls">
        <select class="bouquet-select" id="epgBouquetSelect">
          <option value="">Select bouquet…</option>
        </select>
        <button class="btn-secondary" id="epgLoadBtn">Load EPG</button>
        <select class="epg-zoom-select" id="epgZoomSelect" title="Sichtbarer Zeitbereich">
          <option value="2">2 Std.</option>
          <option value="3" selected>3 Std.</option>
          <option value="6">6 Std.</option>
          <option value="12">12 Std.</option>
          <option value="24">24 Std.</option>
        </select>
      </div>
      <div class="epg-time-nav">
        <button class="btn-icon" id="epgPrevBtn">◀</button>
        <span class="epg-time-range" id="epgTimeRange"></span>
        <button class="btn-icon" id="epgNextBtn">▶</button>
        <button class="btn-secondary" id="epgNowBtn">Jetzt</button>
      </div>
      <button class="epg-overlay-close" id="epgCloseBtn" title="Close">✕</button>
    </div>

    <div class="epg-guide-container">
      <div class="epg-guide-inner" id="epgGuide">
        <div class="epg-guide-placeholder">Select a bouquet and load EPG</div>
      </div>
    </div>
  </div>
</div>

<!-- ─── Bouquet Editor Overlay ────────────────────────────────────────────── -->
<div class="editor-overlay" id="editorOverlay" aria-hidden="true">
  <div class="editor-panel">

    <div class="editor-header">
      <div class="editor-header-left">
        <span class="editor-title">Bouquet Editor</span>
      </div>
      <div class="editor-header-center">
        <select class="bouquet-select editor-bq-select" id="editorBouquetSelect">
          <option value="">Bouquet wählen…</option>
        </select>
        <button class="btn-secondary" id="editorNewBouquetBtn">+ Neu</button>
      </div>
      <div class="editor-header-right">
        <span class="editor-status" id="editorStatus"></span>
        <button class="epg-overlay-close" id="editorCloseBtn" title="Close">✕</button>
      </div>
    </div>

    <!-- Mobile tabs -->
    <div class="editor-tabs">
      <button class="editor-tab active" data-tab="edit">✏️ Edit Bouquet</button>
      <button class="editor-tab" data-tab="search">🔍 Add Channels</button>
    </div>

    <div class="editor-body">

      <!-- Left: Add channels (source search) -->
      <div class="editor-left" id="editorLeft">
        <div class="editor-section-header">
          <span class="editor-section-label">Add Channels</span>
          <select class="bouquet-select editor-source-select" id="editorSourceSelect">
            <option value="">All bouquets…</option>
          </select>
        </div>
        <input class="channel-search editor-search-input" id="editorSearch"
               type="search" placeholder="Search channels…" autocomplete="off" />
        <div class="editor-channel-list" id="editorChannelList">
          <div class="list-placeholder">Select a bouquet above or type to search</div>
        </div>
      </div>

      <!-- Right: Bouquet editor -->
      <div class="editor-right" id="editorRight">
        <div class="editor-section-header">
          <input class="editor-name-input" id="editorBouquetName"
                 placeholder="Bouquet name…" />
          <button class="btn-secondary" id="editorAddMarkerBtn">+ Marker</button>
        </div>
        <div class="editor-sortable" id="editorSortable">
          <div class="list-placeholder" id="editorEmpty">
            Load a bouquet to start editing
          </div>
        </div>
      </div>

    </div>

    <!-- Hidden picon file input -->
    <input type="file" id="edPiconFileInput" accept="image/*" style="display:none">

    <!-- Marker dialog -->
    <div class="ed-dialog" id="edMarkerDialog">
      <div class="ed-dialog-inner">
        <div class="ed-dialog-title">Marker hinzufügen</div>
        <input class="ed-dialog-input" id="edMarkerInput" type="text" placeholder="z.B. HD Sender" maxlength="60" />
        <div class="ed-dialog-actions">
          <button class="btn-secondary" id="edMarkerCancel">Abbrechen</button>
          <button class="btn-accent" id="edMarkerConfirm">Hinzufügen</button>
        </div>
      </div>
    </div>

    <!-- New bouquet dialog -->
    <div class="ed-dialog" id="edNewBqDialog">
      <div class="ed-dialog-inner">
        <div class="ed-dialog-title">Neues Bouquet erstellen</div>
        <input class="ed-dialog-input" id="edNewBqInput" type="text" placeholder="Bouquet Name" maxlength="60" />
        <div class="ed-dialog-actions">
          <button class="btn-secondary" id="edNewBqCancel">Abbrechen</button>
          <button class="btn-accent" id="edNewBqConfirm">Erstellen</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ─── Program Detail Modal ──────────────────────────────────────────────── -->
<div class="modal-backdrop" id="eventModal" aria-hidden="true">
  <div class="modal-panel" role="dialog">
    <button class="modal-close" id="eventModalClose" title="Close">✕</button>
    <div class="modal-channel" id="evtModalChannel"></div>
    <div class="modal-title" id="evtModalTitle"></div>
    <div class="modal-meta" id="evtModalMeta"></div>
    <div class="modal-progress-wrap" id="evtModalProgressWrap">
      <div class="modal-progress-bar" id="evtModalProgress"></div>
    </div>
    <div class="modal-desc" id="evtModalShort"></div>
    <div class="modal-longdesc" id="evtModalLong"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="evtModalTuneBtn">▶ Kanal einschalten</button>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="/js/mpegts.js"></script>
<script src="/js/hls.min.js"></script>
<script src="/js/sortable.min.js"></script>
<script src="/js/app.js"></script>
<script src="/js/epg-timeline.js"></script>
<script src="/js/bouquet-editor.js"></script>
</body>
</html>
